version: '3.8'

services:
  # PHP + Apache service
  web:
    build: .
    container_name: kld_capstone_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=kld_capstone_tracker
    networks:
      - kld_network

  # MySQL database service
  db:
    image: mysql:8.0
    container_name: kld_capstone_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=kld_capstone_tracker
      - MYSQL_USER=kld_user
      - MYSQL_PASSWORD=kld_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database-backup:/docker-entrypoint-initdb.d
    networks:
      - kld_network

  # phpMyAdmin (optional - for easy database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: kld_capstone_phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - UPLOAD_LIMIT=100M
    depends_on:
      - db
    networks:
      - kld_network

volumes:
  db_data:

networks:
  kld_network:
    driver: bridge